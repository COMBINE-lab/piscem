[workspace]

[package]
name = "piscem"
version = "0.16.0"
edition = "2024"
build = "build.rs"
repository = "https://github.com/COMBINE-lab/piscem"

[build-dependencies]
toml = "0.8"

[dependencies]
piscem-rs = "0.1.0"
cf1-rs = "0.3.1"
num_cpus = "1.17.0"
anyhow = "1.0.100"
clap = { version = "4.5.56", features = [
  "cargo",
  "derive",
  "env",
  "wrap_help",
] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", default-features = true, features = [
  "env-filter",
] }
prepare_fasta = { version = "0.2.0" }
serde_json = "1.0.149"
mimalloc = "0.1"

[profile.release]
lto = "thin"
opt-level = 3

# generated by 'cargo dist init'
[profile.dist]
inherits = "release"
