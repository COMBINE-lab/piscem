[workspace]

[package]
name = "piscem"
version = "0.17.1"
edition = "2024"
build = "build.rs"
license = "BSD-3-Clause"
description = "Fast, space-efficient k-mer-based read mapper for bulk RNA-seq, scRNA-seq, and scATAC-seq"
repository = "https://github.com/COMBINE-lab/piscem"
homepage = "https://github.com/COMBINE-lab/piscem"
readme = "README.md"
keywords = ["bioinformatics", "genomics", "rna-seq", "mapping", "kmer"]
categories = ["command-line-utilities", "science"]

[build-dependencies]
toml = "0.8"

[dependencies]
piscem-rs = "0.3.1"
cf1-rs = "0.3.1"
num_cpus = "1.17.0"
anyhow = "1.0.102"
clap = { version = "4.6.0", features = ["cargo", "derive", "env", "wrap_help"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", default-features = true, features = [
  "env-filter",
] }
prepare_fasta = { version = "0.2.0" }
serde_json = "1.0.149"
mimalloc = "0.1"

[profile.release]
lto = "thin"
opt-level = 3

# generated by 'cargo dist init'
[profile.dist]
inherits = "release"
